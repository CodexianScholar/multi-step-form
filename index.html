<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-step-form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="msf--card">
      <div class="msf--sidebar">
        <div class="msf--step-indicator" data-step="1"></div>
        <div class="msf--step-indicator" data-step="2"></div>
        <div class="msf--step-indicator" data-step="3"></div>
        <div class="msf--step-indicator" data-step="4"></div>
      </div>
      <div class="msf--panel">
        <!-- Step 1 your info -->
        <div class="msf--form-step" data-step="1"></div>
        <!-- Step 2 Select Plan -->
        <div class="msf--form-step" data-step="2"></div>
        <!-- Step 3 Add-ons -->
        <div class="msf--form-step" data-step="3"></div>
        <!-- Step 4 Summary -->
        <div class="msf--form-step" data-step="4"></div>
        <!-- Confirmation Panel -->
        <div class="msf--form-step" data-step="5"></div>
        <div class="msf--btn-group">
          <button>Next Step</button>
          <button>Go Back</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
